    background: #111;
    color: #fff;

.container {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
}
.card {
    background: #222;
    border-radius: 15px;
    width: 250px;
    margin: 15px;
    padding: 15px;
    transition: 0.3s;
}
.card:hover {
    transform: scale(1.05);
    background: #333;
}
img {
    width: 100%;
    border-radius: 10px;
}
h2 {
    margin: 10px 0;
}

/* ปุ่ม */
.btn {
    display: inline-block;
    margin: 5px;
    padding: 8px 12px;
    border-radius: 8px;
    text-decoration: none;
    color: white;
    font-size: 14px;
}

/* สีปุ่ม */
.ig {
    background: #e1306c;
}
.fb {
    background: #1877f2;
}

.btn:hover {
    opacity: 0.8;
}
</style>

</head>
